# /etc/nginx/sites-available/lvb.foxai.com.vn
# Reverse proxy: lvb.foxai.com.vn → Docker frontend (port 4000)
#
# Sau khi có SSL (certbot), file này sẽ tự được cập nhật bởi certbot

server {
    listen 80;
    server_name lvb.foxai.com.vn;

    # Redirect HTTP → HTTPS (bật sau khi có SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (SignalR)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeout cho upload file lớn
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        client_max_body_size  60M;
    }
}

